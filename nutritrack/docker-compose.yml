services:
  # Service de la base de données (PostgreSQL)
  db:
    image: postgres:15
    container_name: nutritrack_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=nutritrack_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=pass123
    ports:
      - "5432:5432"

  # Interface graphique pour la base de données (pgAdmin)
  pgadmin:
    image: dpage/pgadmin4
    container_name: nutritrack_pgadmin
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - db

  # Service de l'application Django
  web:
    build: .
    container_name: nutritrack_web
    restart: on-failure
    # On attend que la DB soit prête, puis on migre et on lance le serveur
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_DB=nutritrack_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=pass123
      - POSTGRES_HOST=db
      - DEBUG=True
    depends_on:
      - db

# Définition des volumes pour la persistance des données
volumes:
  postgres_data: