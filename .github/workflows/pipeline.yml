name: Nutritrack Ultimate DevSecOps AWS Academy

on:
  push:
    branches: [ "main" ]

env:
  DOCKER_IMAGE: oumaymaaaaaaaa/nutritrack-app
  AWS_REGION: us-east-1

jobs:
  terraform:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
      - uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: |
          cd terraform
          terraform init
          terraform apply -auto-approve

  tests-and-security:
    runs-on: ubuntu-latest
    needs: terraform
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: nutritrack_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: pass123
        ports: ["5432:5432"]
    steps:
      - uses: actions/checkout@v4
      - run: |
          cd nutritrack
          pip install -r requirements.txt
          python manage.py test
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          exit-code: '1'

  build-and-push:
    runs-on: ubuntu-latest
    needs: tests-and-security
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: oumaymaaaaaaaa
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./nutritrack
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:v${{ github.run_number }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}
      - id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs-task-def.json
          container-name: nutritrack-app
          image: ${{ env.DOCKER_IMAGE }}:v${{ github.run_number }}
      - uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: nutritrack-service-new
          cluster: nutritrack-cluster
          wait-for-service-stability: true