name: Nutritrack DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

env:
  DOCKER_IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/nutritrack-app

jobs:
  # --- JOB 1 : TESTS & QUALITÉ ---
  test-and-quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: nutritrack_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: pass123
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies and Run Tests
        env:
          POSTGRES_DB: nutritrack_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: pass123
          POSTGRES_HOST: localhost
        run: |
          cd nutritrack
          pip install -r requirements.txt
          python manage.py test

      # ÉTAPE SONAR DÉSACTIVÉE TEMPORAIREMENT
      # - name: SonarCloud Scan
      #   uses: sonarsource/sonarqube-scan-action@master
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #     SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

  # --- JOB 2 : SCAN DE SÉCURITÉ DU CODE (SNYK & TRIVY) ---
  security-scans:
    runs-on: ubuntu-latest
    needs: test-and-quality 
    steps:
      - uses: actions/checkout@v4

      - name: Snyk Security Scan (Dependencies)
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
           args: --file=nutritrack/requirements.txt --skip-unresolved

      - name: Trivy FS Scan (Filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          severity: 'CRITICAL'
          exit-code: '1'

  # --- JOB 3 : BUILD, IMAGE SCAN & PUSH DOCKER HUB ---
  build-and-push:
    runs-on: ubuntu-latest
    needs: security-scans
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Construction locale pour scan de l'image avant l'envoi
      - name: Build image for testing
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:test ./nutritrack

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKER_IMAGE }}:test'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Build and Push official image
        uses: docker/build-push-action@v5
        with:
          context: ./nutritrack
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:v${{ github.run_number }} 