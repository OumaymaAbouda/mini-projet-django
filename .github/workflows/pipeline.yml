name: Nutritrack DevSecOps AWS Academy

on:
  push:
    branches: [ "main" ]

env:
  DOCKER_IMAGE: oumaymaaaaaaaa/nutritrack-app
  AWS_REGION: us-east-1

jobs:
  # 1. Terraform (Infrastructure)
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # <--- OBLIGATOIRE
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve

  # 2. Tests & Sécurité
  tests-and-security:
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - uses: actions/checkout@v4
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          exit-code: '1'

  # 3. Build & Push Docker
  build-push:
    runs-on: ubuntu-latest
    needs: tests-and-security
    steps:
      - uses: actions/checkout@v4
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: oumaymaaaaaaaa
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./nutritrack
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:v${{ github.run_number }}

  # 4. Déploiement sur ECS
  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # <--- OBLIGATOIRE
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS Task
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs-task-def.json
          container-name: nutritrack-app
          image: ${{ env.DOCKER_IMAGE }}:v${{ github.run_number }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: nutritrack-service
          cluster: nutritrack-cluster