name: Nutritrack Ultimate DevSecOps AWS Academy

on:
  push:
    branches: [ "main" ]

env:
  DOCKER_IMAGE: oumaymaaaaaaaa/nutritrack-app
  AWS_REGION: us-east-1

jobs:
  # --- JOB 1 : INFRASTRUCTURE (TERRAFORM) ---
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # INSTALLATION DE TERRAFORM (L'étape qui manquait)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Obligatoire pour AWS Academy
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init & Apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve

  # --- JOB 2 : TESTS & SÉCURITÉ DU CODE ---
  tests-and-security:
    runs-on: ubuntu-latest
    needs: terraform
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: nutritrack_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: pass123
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Django Tests
        env:
          POSTGRES_DB: nutritrack_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: pass123
          POSTGRES_HOST: localhost
        run: |
          cd nutritrack
          pip install -r requirements.txt
          python manage.py test

      - name: Snyk Security Scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=nutritrack/requirements.txt --skip-unresolved

      - name: Trivy FS Scan (Vulnerabilities)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          severity: 'CRITICAL'
          exit-code: '1'

  # --- JOB 3 : BUILD & PUSH DOCKER HUB ---
  build-and-push:
    runs-on: ubuntu-latest
    needs: tests-and-security
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: oumaymaaaaaaaa
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./nutritrack
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:v${{ github.run_number }}

  # --- JOB 4 : DÉPLOIEMENT SUR AWS ECS ---
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render Amazon ECS Task Definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs-task-def.json
          container-name: nutritrack-app
          image: ${{ env.DOCKER_IMAGE }}:v${{ github.run_number }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: nutritrack-service
          cluster: nutritrack-cluster
          wait-for-service-stability: true